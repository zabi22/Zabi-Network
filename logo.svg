<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#131620"/>
  
  <!-- Neural network nodes -->
  <circle cx="60" cy="50" r="8" fill="url(#grad1)"/>
  <circle cx="100" cy="50" r="8" fill="url(#grad1)"/>
  <circle cx="140" cy="50" r="8" fill="url(#grad1)"/>
  
  <circle cx="40" cy="100" r="8" fill="url(#grad1)"/>
  <circle cx="80" cy="100" r="8" fill="url(#grad1)"/>
  <circle cx="120" cy="100" r="8" fill="url(#grad1)"/>
  <circle cx="160" cy="100" r="8" fill="url(#grad1)"/>
  
  <circle cx="60" cy="150" r="8" fill="url(#grad1)"/>
  <circle cx="100" cy="150" r="8" fill="url(#grad1)"/>
  <circle cx="140" cy="150" r="8" fill="url(#grad1)"/>
  
  <!-- Connections layer 1 to 2 -->
  <line x1="60" y1="58" x2="40" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="58" x2="80" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="58" x2="80" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="58" x2="120" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="58" x2="120" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="58" x2="160" y2="92" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  
  <!-- Connections layer 2 to 3 -->
  <line x1="40" y1="108" x2="60" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="108" x2="60" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="108" x2="100" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="108" x2="100" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="108" x2="140" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="108" x2="140" y2="142" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  
  <!-- Z text overlay -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">ZABI</text>
</svg>
